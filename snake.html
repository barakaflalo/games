<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — AppNest</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-light:#F0C060;--gold-dim:#6A4E1A;
  --bg:#0A0A0A;--header:#111;--dark2:#1A1A1A;--dark3:#222;
  --text:#E8E0D0;--text-dim:#777;--green:#4CAF7A;--red:#E05050;
  --canvas-bg:#1A1A1A;--border:#333;
}
body.day{
  --bg:#F0EDE6;--header:#E8E2D8;--dark2:#FFFFFF;--dark3:#F0EDE6;
  --text:#1A1A1A;--text-dim:#888;--border:#DDD;--canvas-bg:#FAF8F4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background 0.3s,color 0.3s;}
body.ltr{direction:ltr;}

.header{width:100%;background:var(--header);border-bottom:1px solid var(--gold-dim);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-text{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;}
.logo-sub{font-size:0.55rem;color:var(--gold-dim);letter-spacing:3px;display:block;}
.header-btns{display:flex;gap:6px;align-items:center;}
.icon-btn{background:var(--dark3);border:1px solid var(--gold-dim);color:var(--gold);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.icon-btn:hover{background:var(--dark2);}
.lang-btn{background:var(--dark3);border:1px solid var(--gold-dim);color:var(--gold);padding:5px 9px;border-radius:16px;cursor:pointer;font-size:0.75rem;font-family:'Heebo',sans-serif;position:relative;white-space:nowrap;}
.lang-dropdown{position:absolute;top:110%;left:0;background:var(--dark2);border:1px solid var(--gold-dim);border-radius:10px;display:none;min-width:130px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.lang-dropdown.open{display:block;}
.lang-opt{padding:9px 12px;cursor:pointer;font-size:0.82rem;display:flex;align-items:center;gap:7px;color:var(--text);}
.lang-opt:hover{background:var(--dark3);color:var(--gold);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--dark2);border:1px solid var(--gold-dim);border-radius:18px;padding:24px 20px;max-width:360px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.2rem;margin-bottom:14px;text-align:center;}
.modal-close{float:left;background:none;border:1px solid var(--gold-dim);color:var(--gold);padding:4px 12px;border-radius:10px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:0.8rem;}
body.ltr .modal-close{float:right;}
.modal p,.modal li{color:var(--text-dim);font-size:0.88rem;line-height:1.7;margin-bottom:6px;}
.modal ul{padding-right:18px;}
body.ltr .modal ul{padding-left:18px;padding-right:0;}
.modal .key-badge{display:inline-block;background:var(--dark3);border:1px solid var(--gold-dim);color:var(--gold);padding:2px 8px;border-radius:6px;font-size:0.8rem;margin:0 2px;}
.about-logo{text-align:center;margin-bottom:12px;}
.about-logo svg{filter:drop-shadow(0 0 6px rgba(201,168,76,0.4));}
.about-link{color:var(--gold);text-decoration:none;font-weight:700;}
.about-link:hover{text-decoration:underline;}
.section-title{color:var(--gold);font-size:0.8rem;font-weight:700;margin-top:12px;margin-bottom:4px;letter-spacing:1px;}

.game-wrap{width:100%;max-width:380px;padding:14px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.title{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--gold);text-align:center;}
.subtitle{color:var(--text-dim);font-size:0.82rem;text-align:center;}
.stats-row{display:flex;gap:10px;justify-content:center;width:100%;}
.stat-box{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;flex:1;}
.stat-label{font-size:0.68rem;color:var(--text-dim);}
.stat-val{font-size:1.2rem;font-weight:700;color:var(--gold);}
.speed-row{display:flex;gap:7px;align-items:center;}
.speed-label{color:var(--text-dim);font-size:0.8rem;}
.speed-btn{background:var(--dark3);border:1px solid var(--border);color:var(--text-dim);padding:5px 12px;border-radius:12px;cursor:pointer;font-size:0.8rem;font-family:'Heebo',sans-serif;transition:all 0.15s;}
.speed-btn.active{border-color:var(--gold);color:var(--gold);}
.canvas-wrap{position:relative;border:2px solid var(--gold-dim);border-radius:12px;overflow:hidden;box-shadow:0 0 30px rgba(201,168,76,0.12);}
#gameCanvas{display:block;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.84);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.overlay.hidden{display:none;}
.ov-emoji{font-size:2.8rem;}
.ov-title{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);}
.ov-msg{color:var(--text-dim);font-size:0.88rem;text-align:center;padding:0 10px;}
.gold-btn{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0A0A0A;border:none;padding:10px 26px;border-radius:22px;font-family:'Heebo',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.gold-btn:hover{transform:scale(1.04);box-shadow:0 4px 15px rgba(201,168,76,0.4);}
.controls{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(2,52px);gap:6px;}
.ctrl-btn{background:var(--dark2);border:1px solid var(--gold-dim);color:var(--gold);border-radius:10px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.ctrl-btn:active{background:var(--dark3);transform:scale(0.9);}
.ctrl-up{grid-column:2;grid-row:1;}
.ctrl-left{grid-column:1;grid-row:2;}
.ctrl-down{grid-column:2;grid-row:2;}
.ctrl-right{grid-column:3;grid-row:2;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 34 34"><polygon points="17,2 31,9.5 31,24.5 17,32 3,24.5 3,9.5" fill="#111" stroke="#C9A84C" stroke-width="1.5"/><text x="17" y="22" text-anchor="middle" font-family="Cinzel,serif" font-size="12" fill="#C9A84C">S</text></svg>
    <div><span class="logo-text">Snake</span><span class="logo-sub">APPNEST</span></div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" onclick="openModal('howto')" title="מדריך">❓</button>
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="מצב יום/לילה">🌙</button>
    <button class="icon-btn" onclick="openModal('about')" title="אודות">ℹ️</button>
    <div style="position:relative">
      <button class="lang-btn" onclick="toggleLang()">🌐 <span id="lLabel">עב</span> ▾</button>
      <div class="lang-dropdown" id="lDrop">
        <div class="lang-opt" onclick="setLang('he')">🇮🇱 עברית</div>
        <div class="lang-opt" onclick="setLang('en')">🇬🇧 English</div>
        <div class="lang-opt" onclick="setLang('ru')">🇷🇺 Русский</div>
        <div class="lang-opt" onclick="setLang('es')">🇪🇸 Español</div>
        <div class="lang-opt" onclick="setLang('ar')">🇸🇦 العربية</div>
      </div>
    </div>
  </div>
</div>

<!-- HOW TO MODAL -->
<div class="modal-bg" id="howtoModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('howto')" data-i="close">סגור</button>
    <div class="modal-title" data-i="howtoTitle">❓ איך משחקים</div>
    <div id="howtoContent"></div>
  </div>
</div>

<!-- ABOUT MODAL -->
<div class="modal-bg" id="aboutModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('about')" data-i="close">סגור</button>
    <div class="about-logo"><svg width="54" height="54" viewBox="0 0 34 34"><polygon points="17,2 31,9.5 31,24.5 17,32 3,24.5 3,9.5" fill="#111" stroke="#C9A84C" stroke-width="1.5"/><text x="17" y="22" text-anchor="middle" font-family="Cinzel,serif" font-size="12" fill="#C9A84C">S</text></svg></div>
    <div class="modal-title">Snake — AppNest</div>
    <div id="aboutContent"></div>
  </div>
</div>

<div class="game-wrap">
  <div class="title" data-i="title">🐍 נחש</div>
  <div class="subtitle" data-i="sub">אכול את האוכל, אל תפגע בקירות!</div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-label" data-i="score">ניקוד</div><div class="stat-val" id="scoreVal">0</div></div>
    <div class="stat-box"><div class="stat-label" data-i="best">שיא</div><div class="stat-val" id="bestVal">0</div></div>
    <div class="stat-box"><div class="stat-label" data-i="level">שלב</div><div class="stat-val" id="levelVal">1</div></div>
  </div>
  <div class="speed-row">
    <span class="speed-label" data-i="speed">מהירות:</span>
    <button class="speed-btn active" onclick="setSpeed(1)" id="sp1" data-i="slow">איטי</button>
    <button class="speed-btn" onclick="setSpeed(2)" id="sp2" data-i="medium">בינוני</button>
    <button class="speed-btn" onclick="setSpeed(3)" id="sp3" data-i="fast">מהיר</button>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay" id="overlay">
      <div class="ov-emoji" id="ovEmoji">🐍</div>
      <div class="ov-title" id="ovTitle" data-i="title">נחש</div>
      <div class="ov-msg" id="ovMsg" data-i="startMsg">לחץ התחל כדי לשחק</div>
      <button class="gold-btn" onclick="startGame()" id="startBtn" data-i="start">התחל</button>
    </div>
  </div>
  <div class="controls">
    <button class="ctrl-btn ctrl-up"    ontouchstart="changeDir(0,-1)" onclick="changeDir(0,-1)">▲</button>
    <button class="ctrl-btn ctrl-left"  ontouchstart="changeDir(1,0)"  onclick="changeDir(1,0)">►</button>
    <button class="ctrl-btn ctrl-down"  ontouchstart="changeDir(0,1)"  onclick="changeDir(0,1)">▼</button>
    <button class="ctrl-btn ctrl-right" ontouchstart="changeDir(-1,0)" onclick="changeDir(-1,0)">◄</button>
  </div>
</div>

<script>
// ---- I18N ----
const T={
  he:{
    title:'🐍 נחש',sub:'אכול את האוכל, אל תפגע בקירות!',
    score:'ניקוד',best:'שיא',level:'שלב',speed:'מהירות:',slow:'איטי',medium:'בינוני',fast:'מהיר',
    start:'התחל',startMsg:'לחץ התחל כדי לשחק',gameOver:'משחק נגמר!',goMsg:'ניקוד: ',playAgain:'שחק שוב',
    close:'סגור',howtoTitle:'❓ איך משחקים',
    howto:`<p class="section-title">🎯 מטרת המשחק</p>
      <p>הנחש אוכל את האוכל (עיגול אדום) וגדל. אל תפגע בקירות ואל תפגע בגוף שלך!</p>
      <p class="section-title">🕹️ שליטה</p>
      <ul><li><span class="key-badge">▲ ▼ ◄ ►</span> כפתורי הכיוון במסך</li>
      <li>מקשי <span class="key-badge">←↑→↓</span> במקלדת</li>

      <ul><li>כל אוכל = 10 × שלב נוכחי</li>
      <li>כל 100 נקודות עולים שלב</li>
      <li>שלב גבוה = נחש מהיר יותר</li></ul>`,
    about:`<p>© 2025 AppNest — כל הזכויות שמורות</p>
      <p style="margin-top:8px">פותח על ידי צוות AppNest. חלק מאוסף המשחקים החינמיים.</p>
      <p style="margin-top:8px">🌐 <a class="about-link" href="https://barakaflalo.github.io/appnest" target="_blank">barakaflalo.github.io/appnest</a></p>`,
  },
  en:{
    title:'🐍 Snake',sub:'Eat the food, avoid the walls!',
    score:'Score',best:'Best',level:'Level',speed:'Speed:',slow:'Slow',medium:'Medium',fast:'Fast',
    start:'Start',startMsg:'Press Start to play',gameOver:'Game Over!',goMsg:'Score: ',playAgain:'Play Again',
    close:'Close',howtoTitle:'❓ How to Play',
    howto:`<p class="section-title">🎯 GOAL</p>
      <p>Guide the snake to eat food (red circle) and grow. Don't hit the walls or yourself!</p>
      <p class="section-title">🕹️ CONTROLS</p>
      <ul><li><span class="key-badge">▲ ▼ ◄ ►</span> On-screen buttons</li>
      <li>Keyboard <span class="key-badge">←↑→↓</span> arrow keys</li>
      <li>Swipe on screen</li></ul>
      <p class="section-title">⭐ SCORING</p>
      <ul><li>Each food = 10 × current level</li>
      <li>Every 100 points = next level</li>
      <li>Higher level = faster snake</li></ul>`,
    about:`<p>© 2025 AppNest — All rights reserved</p>
      <p style="margin-top:8px">Developed by the AppNest team. Part of the free games collection.</p>
      <p style="margin-top:8px">🌐 <a class="about-link" href="https://barakaflalo.github.io/appnest" target="_blank">barakaflalo.github.io/appnest</a></p>`,
  },
  ru:{
    title:'🐍 Змейка',sub:'Ешь еду, не врезайся в стены!',
    score:'Счёт',best:'Рекорд',level:'Уровень',speed:'Скорость:',slow:'Медленно',medium:'Средне',fast:'Быстро',
    start:'Старт',startMsg:'Нажми Старт для игры',gameOver:'Игра окончена!',goMsg:'Счёт: ',playAgain:'Играть снова',
    close:'Закрыть',howtoTitle:'❓ Как играть',
    howto:`<p class="section-title">🎯 ЦЕЛЬ</p>
      <p>Управляй змейкой, чтобы есть еду (красный круг) и расти. Не врезайся в стены и в себя!</p>
      <p class="section-title">🕹️ УПРАВЛЕНИЕ</p>
      <ul><li><span class="key-badge">▲ ▼ ◄ ►</span> Кнопки на экране</li>
      <li>Клавиши <span class="key-badge">←↑→↓</span></li>
      <li>Свайп по экрану</li></ul>
      <p class="section-title">⭐ ОЧКИ</p>
      <ul><li>Каждая еда = 10 × уровень</li>
      <li>Каждые 100 очков = новый уровень</li></ul>`,
    about:`<p>© 2025 AppNest — Все права защищены</p>
      <p style="margin-top:8px">Разработано командой AppNest.</p>
      <p style="margin-top:8px">🌐 <a class="about-link" href="https://barakaflalo.github.io/appnest" target="_blank">barakaflalo.github.io/appnest</a></p>`,
  },
  es:{
    title:'🐍 Serpiente',sub:'¡Come la comida, evita las paredes!',
    score:'Puntos',best:'Récord',level:'Nivel',speed:'Velocidad:',slow:'Lento',medium:'Medio',fast:'Rápido',
    start:'Iniciar',startMsg:'Presiona Iniciar para jugar',gameOver:'¡Juego terminado!',goMsg:'Puntos: ',playAgain:'Jugar de nuevo',
    close:'Cerrar',howtoTitle:'❓ Cómo jugar',
    howto:`<p class="section-title">🎯 OBJETIVO</p>
      <p>Guía la serpiente para comer comida (círculo rojo) y crecer. ¡No choques con las paredes ni contigo mismo!</p>
      <p class="section-title">🕹️ CONTROLES</p>
      <ul><li><span class="key-badge">▲ ▼ ◄ ►</span> Botones en pantalla</li>
      <li>Teclas <span class="key-badge">←↑→↓</span></li>
      <li>Desliza en la pantalla</li></ul>
      <p class="section-title">⭐ PUNTUACIÓN</p>
      <ul><li>Cada comida = 10 × nivel actual</li>
      <li>Cada 100 puntos = nuevo nivel</li></ul>`,
    about:`<p>© 2025 AppNest — Todos los derechos reservados</p>
      <p style="margin-top:8px">Desarrollado por el equipo AppNest.</p>
      <p style="margin-top:8px">🌐 <a class="about-link" href="https://barakaflalo.github.io/appnest" target="_blank">barakaflalo.github.io/appnest</a></p>`,
  },
  ar:{
    title:'🐍 الثعبان',sub:'كل الطعام، تجنب الجدران!',
    score:'النقاط',best:'أفضل',level:'المستوى',speed:'السرعة:',slow:'بطيء',medium:'متوسط',fast:'سريع',
    start:'ابدأ',startMsg:'اضغط ابدأ للعب',gameOver:'انتهت اللعبة!',goMsg:'النقاط: ',playAgain:'العب مجدداً',
    close:'إغلاق',howtoTitle:'❓ كيف تلعب',
    howto:`<p class="section-title">🎯 الهدف</p>
      <p>وجّه الثعبان لأكل الطعام (الدائرة الحمراء) والنمو. لا تصطدم بالجدران أو بنفسك!</p>
      <p class="section-title">🕹️ التحكم</p>
      <ul><li><span class="key-badge">▲ ▼ ◄ ►</span> أزرار الشاشة</li>
      <li>مفاتيح <span class="key-badge">←↑→↓</span></li>
      <li>اسحب على الشاشة</li></ul>
      <p class="section-title">⭐ النقاط</p>
      <ul><li>كل طعام = 10 × المستوى الحالي</li>
      <li>كل 100 نقطة = مستوى جديد</li></ul>`,
    about:`<p>© 2025 AppNest — جميع الحقوق محفوظة</p>
      <p style="margin-top:8px">تم التطوير بواسطة فريق AppNest.</p>
      <p style="margin-top:8px">🌐 <a class="about-link" href="https://barakaflalo.github.io/appnest" target="_blank">barakaflalo.github.io/appnest</a></p>`,
  },
};
let lang='he',isDark=true;
function t(k){return(T[lang]||T.en)[k]||k;}
function setLang(l){
  lang=l;
  document.getElementById('lLabel').textContent={he:'עב',en:'EN',ru:'РУ',es:'ES',ar:'عر'}[l];
  document.getElementById('lDrop').classList.remove('open');
  const rtl=['he','ar'].includes(l);
  document.body.dir=rtl?'rtl':'ltr';
  document.body.classList.toggle('ltr',!rtl);
  applyT();
}
function toggleLang(){document.getElementById('lDrop').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.lang-btn')&&!e.target.closest('.lang-dropdown'))document.getElementById('lDrop').classList.remove('open');});
function applyT(){
  document.querySelectorAll('[data-i]').forEach(el=>el.textContent=t(el.dataset.i));
  // Update modal content if open
  document.getElementById('howtoContent').innerHTML=t('howto');
  document.getElementById('aboutContent').innerHTML=t('about');
}
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('day',!isDark);
  document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
}
function openModal(type){
  document.getElementById('howtoContent').innerHTML=t('howto');
  document.getElementById('aboutContent').innerHTML=t('about');
  document.getElementById(type+'Modal').classList.add('open');
}
function closeModal(type){document.getElementById(type+'Modal').classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ---- GAME ----
const COLS=20,ROWS=20,CELL=16;
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
canvas.width=COLS*CELL; canvas.height=ROWS*CELL;
const SPEEDS=[0,180,130,80];
let snake,dir,nextDir,food,score,best=0,level,gameLoop,speedMode=1,running=false;

function setSpeed(s){
  speedMode=s;
  ['sp1','sp2','sp3'].forEach((id,i)=>document.getElementById(id).classList.toggle('active',i+1===s));
  if(running){clearInterval(gameLoop);gameLoop=setInterval(tick,SPEEDS[s]);}
}
function startGame(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=1;running=true;
  placeFood();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('scoreVal').textContent=0;
  document.getElementById('levelVal').textContent=1;
  clearInterval(gameLoop);
  gameLoop=setInterval(tick,SPEEDS[speedMode]);
}
function placeFood(){
  do{food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}
function tick(){
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10*level;if(score>best)best=score;
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('bestVal').textContent=best;
    const nl=Math.floor(score/100)+1;
    if(nl>level){level=nl;document.getElementById('levelVal').textContent=level;}
    placeFood();
  } else snake.pop();
  draw();
}
function draw(){
  const bg=isDark?'#1A1A1A':'#FAF8F4';
  const gridColor=isDark?'#222':'#E8E4DC';
  ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle=gridColor;ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(canvas.width,i*CELL);ctx.stroke();}
  snake.forEach((s,i)=>{
    const alpha=1-i/(snake.length+5);
    ctx.fillStyle=i===0?'#C9A84C':`rgba(180,140,60,${Math.max(0.2,alpha)})`;
    ctx.beginPath();ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,i===0?5:3);ctx.fill();
    if(i===0){
      ctx.fillStyle=isDark?'#0A0A0A':'#FFF';
      const ex=dir.x===1?CELL-5:dir.x===-1?3:CELL/2-3;
      const ey=dir.y===1?CELL-5:dir.y===-1?3:CELL/2-3;
      ctx.fillRect(s.x*CELL+ex-1,s.y*CELL+ey-1,3,3);
    }
  });
  ctx.fillStyle='#E05050';
  ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFF';ctx.fillRect(food.x*CELL+CELL/2-1,food.y*CELL+3,2,3);
}
function endGame(){
  clearInterval(gameLoop);running=false;
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('ovEmoji').textContent='💀';
  document.getElementById('ovTitle').textContent=t('gameOver');
  document.getElementById('ovMsg').textContent=t('goMsg')+score;
  ov.querySelector('.gold-btn').textContent=t('playAgain');
  ov.querySelector('.gold-btn').onclick=startGame;
}
function changeDir(dx,dy){
  if(dx===1&&dir.x===-1||dx===-1&&dir.x===1)return;
  if(dy===1&&dir.y===-1||dy===-1&&dir.y===1)return;
  nextDir={x:dx,y:dy};
}
document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if(map[e.key]){e.preventDefault();changeDir(...map[e.key]);}
  if(e.key===' '&&!running)startGame();
});
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy))changeDir(dx>0?1:-1,0);
  else changeDir(0,dy>0?1:-1);
},{passive:true});

draw();applyT();
</script>
